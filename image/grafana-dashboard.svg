<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>Grafana ダッシュボード Node Overview (Lab) のレイアウト概念図</title>
  <desc>Prometheus + Grafana + node_exporter で取得した CPU使用率、メモリ使用率、ディスク空き率、Load average、ネットワーク受信のパネル配置を示す概念図</desc>
  <!-- Grafana ダッシュボードのレイアウト概念図 (Lab 用) -->

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#181b1f"/>
      <stop offset="1" stop-color="#0f1114"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2227"/>
      <stop offset="1" stop-color="#181b1f"/>
    </linearGradient>
    <linearGradient id="sparkGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7eb26d" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7eb26d" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="sparkYellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eab839" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#eab839" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="sparkOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef843c" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ef843c" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="sparkBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5794f2" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5794f2" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- トップバー -->
  <rect x="0" y="0" width="1200" height="48" fill="#0b0c0e"/>
  <circle cx="28" cy="24" r="11" fill="#f15a29"/>
  <text x="50" y="29" fill="#dfe1e6" font-size="14" font-weight="600">Grafana — Lab / Node Overview (Lab)</text>
  <text x="1080" y="29" fill="#8e9297" font-size="12">⏱ Last 1 hour</text>

  <!-- パネル 1: CPU 使用率 (Stat) -->
  <g transform="translate(20,68)">
    <rect width="380" height="180" rx="3" fill="url(#panel)" stroke="#2c3035"/>
    <text x="18" y="26" fill="#c4c6c9" font-size="13" font-weight="600">CPU 使用率</text>
    <text x="364" y="26" fill="#5d6066" font-size="11" text-anchor="end">%</text>
    <text x="190" y="118" fill="#7eb26d" font-size="64" font-weight="700" text-anchor="middle">23.4</text>
    <text x="190" y="148" fill="#8e9297" font-size="13" text-anchor="middle">lab-host-01</text>
    <!-- thresholds bar -->
    <rect x="18" y="160" width="240" height="5" fill="#7eb26d"/>
    <rect x="258" y="160" width="61" height="5" fill="#eab839"/>
    <rect x="319" y="160" width="43" height="5" fill="#e24d42"/>
  </g>

  <!-- パネル 2: メモリ使用率 (Stat) -->
  <g transform="translate(410,68)">
    <rect width="380" height="180" rx="3" fill="url(#panel)" stroke="#2c3035"/>
    <text x="18" y="26" fill="#c4c6c9" font-size="13" font-weight="600">メモリ使用率</text>
    <text x="364" y="26" fill="#5d6066" font-size="11" text-anchor="end">%</text>
    <text x="190" y="118" fill="#eab839" font-size="64" font-weight="700" text-anchor="middle">78.1</text>
    <text x="190" y="148" fill="#8e9297" font-size="13" text-anchor="middle">lab-host-01</text>
    <rect x="18" y="160" width="180" height="5" fill="#7eb26d"/>
    <rect x="198" y="160" width="60" height="5" fill="#eab839"/>
    <rect x="258" y="160" width="104" height="5" fill="#e24d42"/>
  </g>

  <!-- パネル 3: ディスク空き率 (Stat) -->
  <g transform="translate(800,68)">
    <rect width="380" height="180" rx="3" fill="url(#panel)" stroke="#2c3035"/>
    <text x="18" y="26" fill="#c4c6c9" font-size="13" font-weight="600">ディスク空き率 (/)</text>
    <text x="364" y="26" fill="#5d6066" font-size="11" text-anchor="end">%</text>
    <text x="190" y="118" fill="#7eb26d" font-size="64" font-weight="700" text-anchor="middle">42.6</text>
    <text x="190" y="148" fill="#8e9297" font-size="13" text-anchor="middle">lab-host-01</text>
    <rect x="18" y="160" width="36" height="5" fill="#e24d42"/>
    <rect x="54" y="160" width="36" height="5" fill="#eab839"/>
    <rect x="90" y="160" width="272" height="5" fill="#7eb26d"/>
  </g>

  <!-- パネル 4: Load average (Time series) -->
  <g transform="translate(20,268)">
    <rect width="580" height="270" rx="3" fill="url(#panel)" stroke="#2c3035"/>
    <text x="18" y="26" fill="#c4c6c9" font-size="13" font-weight="600">Load average (1 / 5 / 15)</text>
    <!-- y-axis labels -->
    <text x="40" y="60" fill="#5d6066" font-size="10" text-anchor="end">3.0</text>
    <text x="40" y="115" fill="#5d6066" font-size="10" text-anchor="end">2.0</text>
    <text x="40" y="170" fill="#5d6066" font-size="10" text-anchor="end">1.0</text>
    <text x="40" y="225" fill="#5d6066" font-size="10" text-anchor="end">0.0</text>
    <!-- grid -->
    <line x1="45" y1="55" x2="560" y2="55" stroke="#2c3035"/>
    <line x1="45" y1="110" x2="560" y2="110" stroke="#2c3035"/>
    <line x1="45" y1="165" x2="560" y2="165" stroke="#2c3035"/>
    <line x1="45" y1="220" x2="560" y2="220" stroke="#2c3035"/>
    <!-- series: load1 (more volatile) -->
    <polyline fill="none" stroke="#7eb26d" stroke-width="2"
              points="50,200 80,170 110,180 140,150 170,160 200,140 230,165 260,130 290,150 320,110 350,135 380,90 410,120 440,100 470,130 500,115 530,125 560,140"/>
    <!-- series: load5 (smoother) -->
    <polyline fill="none" stroke="#eab839" stroke-width="2"
              points="50,205 80,195 110,190 140,180 170,175 200,168 230,162 260,158 290,155 320,150 350,148 380,140 410,138 440,135 470,138 500,140 530,142 560,148"/>
    <!-- series: load15 (smoothest) -->
    <polyline fill="none" stroke="#ef843c" stroke-width="2"
              points="50,215 80,210 110,205 140,200 170,195 200,190 230,186 260,182 290,178 320,175 350,172 380,168 410,165 440,162 470,160 500,158 530,156 560,155"/>
    <!-- x-axis labels -->
    <text x="50" y="245" fill="#5d6066" font-size="10">-60m</text>
    <text x="200" y="245" fill="#5d6066" font-size="10">-40m</text>
    <text x="350" y="245" fill="#5d6066" font-size="10">-20m</text>
    <text x="540" y="245" fill="#5d6066" font-size="10">now</text>
    <!-- legend -->
    <rect x="430" y="40" width="9" height="9" fill="#7eb26d"/><text x="443" y="49" fill="#c4c6c9" font-size="10">load1</text>
    <rect x="475" y="40" width="9" height="9" fill="#eab839"/><text x="488" y="49" fill="#c4c6c9" font-size="10">load5</text>
    <rect x="520" y="40" width="9" height="9" fill="#ef843c"/><text x="533" y="49" fill="#c4c6c9" font-size="10">load15</text>
  </g>

  <!-- パネル 5: ネットワーク受信 (Time series) -->
  <g transform="translate(610,268)">
    <rect width="570" height="270" rx="3" fill="url(#panel)" stroke="#2c3035"/>
    <text x="18" y="26" fill="#c4c6c9" font-size="13" font-weight="600">ネットワーク受信 (bytes/s)</text>
    <text x="18" y="50" fill="#5d6066" font-size="11">eth0</text>
    <!-- area chart -->
    <path d="M 50,210 L 80,180 L 110,195 L 140,160 L 170,175 L 200,130 L 230,150 L 260,110 L 290,135 L 320,90 L 350,115 L 380,75 L 410,100 L 440,85 L 470,110 L 500,95 L 530,105 L 560,115 L 560,225 L 50,225 Z"
          fill="url(#sparkBlue)" stroke="#5794f2" stroke-width="2"/>
    <!-- y-axis labels -->
    <text x="42" y="60" fill="#5d6066" font-size="10" text-anchor="end">2 MB</text>
    <text x="42" y="115" fill="#5d6066" font-size="10" text-anchor="end">1 MB</text>
    <text x="42" y="170" fill="#5d6066" font-size="10" text-anchor="end">500K</text>
    <text x="42" y="225" fill="#5d6066" font-size="10" text-anchor="end">0</text>
    <!-- grid -->
    <line x1="46" y1="55" x2="560" y2="55" stroke="#2c3035"/>
    <line x1="46" y1="110" x2="560" y2="110" stroke="#2c3035"/>
    <line x1="46" y1="165" x2="560" y2="165" stroke="#2c3035"/>
    <line x1="46" y1="225" x2="560" y2="225" stroke="#2c3035"/>
    <!-- x labels -->
    <text x="50" y="248" fill="#5d6066" font-size="10">-60m</text>
    <text x="540" y="248" fill="#5d6066" font-size="10">now</text>
  </g>

  <!-- アラートバナー -->
  <g transform="translate(20,558)">
    <rect width="1160" height="44" rx="3" fill="#3a2418" stroke="#e24d42"/>
    <circle cx="22" cy="22" r="8" fill="#e24d42"/>
    <text x="42" y="20" fill="#e8eaed" font-size="12" font-weight="700">HostHighMemory (warning) — available &lt; 10% が 15分継続</text>
    <text x="42" y="35" fill="#a4a8b0" font-size="10">/etc/prometheus/alert.rules.yml — group host-baseline / for 15m / labels.severity=warning</text>
    <text x="1140" y="28" fill="#a4a8b0" font-size="10" text-anchor="end">since 09:42</text>
  </g>

  <!-- フッタ -->
  <text x="20" y="630" fill="#5d6066" font-size="10">Lab 用最小ダッシュボード概念図 — 実物は monitoring-stack/ を docker compose up で起動</text>
  <text x="20" y="650" fill="#5d6066" font-size="10">CPU / Memory / Disk のしきい値配色 (green / yellow / red) は alert.rules.yml のしきい値に対応</text>
  <text x="20" y="670" fill="#5d6066" font-size="10">この SVG はベクター画像で、画像バジェットへの影響が小さい (~6KB)</text>
</svg>
