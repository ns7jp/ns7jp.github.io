; Lab 用インベントリ。実環境では Ansible Vault や動的インベントリを使う。
;
; 例:
;   ansible-playbook -i inventory.ini playbook.yml --check
;
; ssh_port を変更している場合は ansible_port も合わせて指定する。

[linux_servers]
lab-host-01 ansible_host=192.0.2.10 ansible_user=opsadmin ansible_port=22

[linux_servers:vars]
ansible_python_interpreter=/usr/bin/python3
