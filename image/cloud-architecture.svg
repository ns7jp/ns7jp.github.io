<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" role="img"
     aria-labelledby="cloudTitle cloudDesc" preserveAspectRatio="xMidYMid meet">
  <title id="cloudTitle">Cloud Server Bootstrap 構成図 (AWS Free Tier + Terraform + cloud-init)</title>
  <desc id="cloudDesc">
    AWS Free Tier 枠内で Linux サーバーを 1 台立ち上げる Terraform + cloud-init の構成図。
    運用者の PC からインターネット越しに SSH 接続し、Internet Gateway 経由で AWS リージョン内の VPC、
    Public Subnet、EC2 t3.micro (Ubuntu 22.04) に到達する。Security Group は運用者 CIDR からの 22/tcp のみ許可。
    EC2 起動時に cloud-init が SSH ハードニング、ufw、fail2ban、unattended-upgrades、
    support-toolkit クローンと cron 登録までを冪等に実行する。
  </desc>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5D6D7E"/>
    </marker>
    <style>
      <![CDATA[
        .t-title       { font: 700 22px 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; fill: #2C3E50; }
        .t-sub         { font: 400 13px 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; fill: #5D6D7E; }
        .layer-aws     { fill: #FAF4E8; stroke: #B8860B; stroke-width: 1.6; stroke-dasharray: 6 4; }
        .layer-vpc     { fill: #FFFFFF; stroke: #2C3E50; stroke-width: 1.4; }
        .layer-subnet  { fill: #F5F1EA; stroke: #2C3E50; stroke-width: 1.2; stroke-dasharray: 4 3; }
        .layer-label   { font: 700 14px 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; fill: #2C3E50; }
        .layer-sub     { font: 400 11px 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; fill: #5D6D7E; }
        .box           { fill: #FFFFFF; stroke: #2C3E50; stroke-width: 1.2; }
        .box-key       { fill: #FFFCF1; stroke: #B8860B; stroke-width: 1.6; }
        .box-title     { font: 600 14px 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; fill: #2C3E50; }
        .box-sub       { font: 400 11px 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; fill: #5D6D7E; }
        .conn          { stroke: #5D6D7E; stroke-width: 1.4; fill: none; }
        .conn-label    { font: 500 11px 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; fill: #5D6D7E; }
        .step-num      { fill: #B8860B; stroke: none; }
        .step-num-text { font: 700 11px 'Helvetica Neue', Arial, sans-serif; fill: #FFFFFF; }
        .step-text     { font: 400 11.5px 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; fill: #2C3E50; }
        .step-bold     { font: 600 11.5px 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; fill: #2C3E50; }
        .footer-bg     { fill: #FFFFFF; stroke: #E8E0D5; stroke-width: 1; }
        .footer-title  { font: 700 13px 'Helvetica Neue', Arial, 'Noto Sans JP', sans-serif; fill: #2C3E50; }
      ]]>
    </style>
  </defs>

  <!-- ====================== Title ====================== -->
  <text x="550" y="32" text-anchor="middle" class="t-title">Cloud Server Bootstrap — AWS Free Tier + Terraform + cloud-init</text>
  <text x="550" y="52" text-anchor="middle" class="t-sub">VPC + EC2 t3.micro (Ubuntu 22.04) を最小構成で立ち上げ、cloud-init で OS ハードニング・support-toolkit 連携まで自動化</text>

  <!-- ====================== Operator (left) ====================== -->
  <g transform="translate(40, 120)">
    <rect x="0" y="0" width="220" height="100" rx="8" ry="8" class="box-key"/>
    <text x="110" y="26" text-anchor="middle" class="box-title">運用者 PC</text>
    <text x="110" y="46" text-anchor="middle" class="box-sub">SSH 公開鍵 (ed25519)</text>
    <text x="110" y="62" text-anchor="middle" class="box-sub">terraform CLI (1.5+)</text>
    <text x="110" y="78" text-anchor="middle" class="box-sub">AWS 認証情報</text>
    <text x="110" y="94" text-anchor="middle" class="box-sub">固定 IP または VPN 出口</text>
  </g>

  <!-- Operator → Internet -->
  <path d="M 260 170 L 320 170" class="conn" marker-end="url(#arrow2)"/>
  <text x="262" y="160" class="conn-label">SSH (port 22)</text>
  <text x="262" y="186" class="conn-label">terraform apply</text>

  <!-- Internet cloud (center) -->
  <g transform="translate(320, 130)">
    <ellipse cx="60" cy="40" rx="60" ry="32" fill="#F5F1EA" stroke="#5D6D7E" stroke-width="1.2"/>
    <text x="60" y="38" text-anchor="middle" class="box-title">Internet</text>
    <text x="60" y="54" text-anchor="middle" class="box-sub">公衆網</text>
  </g>

  <!-- Internet → IGW -->
  <path d="M 440 170 L 500 170" class="conn" marker-end="url(#arrow2)"/>
  <text x="448" y="160" class="conn-label">運用者 CIDR のみ</text>
  <text x="448" y="186" class="conn-label">22/tcp 許可</text>

  <!-- ====================== AWS Region ====================== -->
  <rect x="500" y="80" width="560" height="320" rx="10" ry="10" class="layer-aws"/>
  <text x="520" y="102" class="layer-label">☁ AWS Region — ap-northeast-1 (例)</text>
  <text x="520" y="118" class="layer-sub">Free Tier: t3.micro 750h/月 + EBS gp3 30GB/月</text>

  <!-- IGW -->
  <g transform="translate(520, 145)">
    <rect x="0" y="0" width="120" height="50" rx="6" ry="6" class="box"/>
    <text x="60" y="22" text-anchor="middle" class="box-title">IGW</text>
    <text x="60" y="40" text-anchor="middle" class="box-sub">Internet Gateway</text>
  </g>

  <!-- IGW → Route Table -->
  <path d="M 580 195 L 580 230" class="conn" marker-end="url(#arrow2)"/>

  <!-- Route Table -->
  <g transform="translate(520, 230)">
    <rect x="0" y="0" width="120" height="50" rx="6" ry="6" class="box"/>
    <text x="60" y="22" text-anchor="middle" class="box-title">Route Table</text>
    <text x="60" y="40" text-anchor="middle" class="box-sub">0.0.0.0/0 → IGW</text>
  </g>

  <!-- VPC box -->
  <rect x="660" y="135" width="380" height="240" rx="8" ry="8" class="layer-vpc"/>
  <text x="676" y="156" class="layer-label">VPC — 10.0.0.0/16</text>

  <!-- Public Subnet -->
  <rect x="680" y="170" width="340" height="160" rx="6" ry="6" class="layer-subnet"/>
  <text x="696" y="190" class="layer-label">Public Subnet — 10.0.1.0/24 (AZ: a)</text>

  <!-- EC2 Instance -->
  <g transform="translate(710, 205)">
    <rect x="0" y="0" width="280" height="115" rx="6" ry="6" class="box-key"/>
    <text x="140" y="22" text-anchor="middle" class="box-title">EC2 t3.micro — Ubuntu 22.04 LTS</text>
    <text x="140" y="40" text-anchor="middle" class="box-sub">Canonical 公式 AMI (data source 動的解決)</text>
    <text x="140" y="58" text-anchor="middle" class="box-sub">EBS gp3 8GB / 暗号化</text>
    <text x="140" y="76" text-anchor="middle" class="box-sub">IMDSv2 強制 (http_tokens = required)</text>
    <text x="140" y="94" text-anchor="middle" class="box-sub">cloud-init bootstrap → support-toolkit cron</text>
  </g>

  <!-- Security Group label -->
  <g transform="translate(680, 340)">
    <rect x="0" y="0" width="340" height="28" rx="4" ry="4" fill="#FFFCF1" stroke="#B8860B" stroke-width="1.2"/>
    <text x="170" y="18" text-anchor="middle" class="layer-label">Security Group: SSH 22/tcp from operator CIDR のみ</text>
  </g>

  <!-- Connector: Route Table → VPC/EC2 -->
  <path d="M 640 255 L 700 255" class="conn" marker-end="url(#arrow2)"/>

  <!-- ====================== Footer: cloud-init steps ====================== -->
  <rect x="40" y="430" width="1020" height="310" rx="6" ry="6" class="footer-bg"/>
  <text x="56" y="454" class="footer-title">cloud-init bootstrap (EC2 初回起動時に 1 回だけ実行 — 冪等性を考慮)</text>

  <!-- Steps in 2-column layout -->
  <!-- Step 1 -->
  <circle cx="74" cy="488" r="13" class="step-num"/>
  <text x="74" y="492" text-anchor="middle" class="step-num-text">1</text>
  <text x="98" y="486" class="step-bold">パッケージ更新</text>
  <text x="98" y="502" class="step-text">apt update + upgrade、ufw / fail2ban / unattended-upgrades / smartmontools / git をインストール</text>

  <!-- Step 2 -->
  <circle cx="74" cy="538" r="13" class="step-num"/>
  <text x="74" y="542" text-anchor="middle" class="step-num-text">2</text>
  <text x="98" y="536" class="step-bold">運用ユーザー作成</text>
  <text x="98" y="552" class="step-text">sudo NOPASSWD + SSH 公開鍵を authorized_keys に書き込み (default: ops)</text>

  <!-- Step 3 -->
  <circle cx="74" cy="588" r="13" class="step-num"/>
  <text x="74" y="592" text-anchor="middle" class="step-num-text">3</text>
  <text x="98" y="586" class="step-bold">SSH ハードニング (drop-in 設定)</text>
  <text x="98" y="602" class="step-text">/etc/ssh/sshd_config.d/99-hardening.conf に PermitRootLogin no / PasswordAuthentication no 等を配置</text>

  <!-- Step 4 -->
  <circle cx="74" cy="638" r="13" class="step-num"/>
  <text x="74" y="642" text-anchor="middle" class="step-num-text">4</text>
  <text x="98" y="636" class="step-bold">ホストファイアウォール (ufw)</text>
  <text x="98" y="652" class="step-text">default deny incoming + 22/tcp のみ許可。Security Group との二重防御。</text>

  <!-- Step 5 -->
  <circle cx="74" cy="688" r="13" class="step-num"/>
  <text x="74" y="692" text-anchor="middle" class="step-num-text">5</text>
  <text x="98" y="686" class="step-bold">ブルートフォース対策 (fail2ban)</text>
  <text x="98" y="702" class="step-text">sshd jail を有効化。10 分以内 5 回失敗で 1 時間 ban。</text>

  <!-- Right column -->
  <!-- Step 6 -->
  <circle cx="574" cy="488" r="13" class="step-num"/>
  <text x="574" y="492" text-anchor="middle" class="step-num-text">6</text>
  <text x="598" y="486" class="step-bold">自動セキュリティ更新</text>
  <text x="598" y="502" class="step-text">unattended-upgrades を有効化。/etc/apt/apt.conf.d/20auto-upgrades を配置。</text>

  <!-- Step 7 -->
  <circle cx="574" cy="538" r="13" class="step-num"/>
  <text x="574" y="542" text-anchor="middle" class="step-num-text">7</text>
  <text x="598" y="536" class="step-bold">support-toolkit クローン</text>
  <text x="598" y="552" class="step-text">git clone --depth 1 → /opt/support-toolkit/ に Bash 5 本を配置</text>

  <!-- Step 8 -->
  <circle cx="574" cy="588" r="13" class="step-num"/>
  <text x="574" y="592" text-anchor="middle" class="step-num-text">8</text>
  <text x="598" y="586" class="step-bold">cron 日次点検登録</text>
  <text x="598" y="602" class="step-text">毎朝 06:00 に test-disk-capacity / test-security-baseline / collect-host-inventory を JSON 保存</text>

  <!-- Step 9 -->
  <circle cx="574" cy="638" r="13" class="step-num"/>
  <text x="574" y="642" text-anchor="middle" class="step-num-text">9</text>
  <text x="598" y="636" class="step-bold">ログローテーション</text>
  <text x="598" y="652" class="step-text">/var/log/support-toolkit/*.json を logrotate で 90 日保持・gzip 圧縮</text>

  <!-- Step 10 -->
  <circle cx="574" cy="688" r="13" class="step-num"/>
  <text x="574" y="692" text-anchor="middle" class="step-num-text">10</text>
  <text x="598" y="686" class="step-bold">SSH リロード + 完了マーカー</text>
  <text x="598" y="702" class="step-text">sshd -t で構文確認後 reload。.bootstrap-complete を作成し成否を確認可能に。</text>

  <!-- Bottom note -->
  <text x="56" y="730" class="layer-sub">想定月額: Free Tier 範囲内なら $0 (t3.micro 750h + EBS gp3 30GB)。期限後は約 $9-10/月。terraform destroy で完全削除可能。</text>
</svg>
